<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Resgate de Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-50">

    <div id="qrcode-temp" style="display:none"></div>

    <div class="w-full max-w-md space-y-6">
        <div class="text-center space-y-2">
            <div class="inline-block p-3 bg-blue-600 rounded-2xl shadow-xl mb-2">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" stroke-width="2.5"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter uppercase italic">CASA<span class="text-blue-600">QR</span></h1>
            <div id="statusEvento" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Aguardando Evento...</div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-blue-100/50 border border-slate-100 space-y-5">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">CPF do Responsável</label>
                <input type="text" id="cpfResponsavel" placeholder="000.000.000-00" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-blue-500 transition">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Matrícula do Aluno</label>
                <input type="text" readonly id="nomeMostra" class="w-full p-2 bg-transparent text-blue-600 font-black text-center outline-none text-sm uppercase">
                <input type="number" id="matInput" oninput="verificarMatricula(this)" placeholder="Digite a matrícula" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-blue-500 transition">
            </div>

            <button onclick="processarResgate()" id="btnGerar" class="w-full bg-slate-900 hover:bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-lg transition-all transform active:scale-95">
                Resgatar Ingressos
            </button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentEv = null;
        let currentEvId = null;

        // BUSCAR EVENTO ATIVO
        db.ref('eventos').on('value', snap => {
            snap.forEach(i => {
                if(i.val().liberado) {
                    currentEv = i.val();
                    currentEvId = i.key;
                    document.getElementById('statusEvento').innerText = currentEv.nome + " • " + currentEv.data;
                }
            });
        });

        async function verificarMatricula(input) {
            const mat = input.value;
            const cpf = document.getElementById('cpfResponsavel').value.replace(/\D/g, "");
            const nomeBox = document.getElementById('nomeMostra');

            if(mat.length < 3 || cpf.length < 11) return;

            // 1. VERIFICA TRAVA JUDICIAL NO BANCO
            const snapExc = await db.ref('excecoes_judiciais/' + mat).once('value');
            const temBriga = snapExc.exists();

            // 2. CONTA INGRESSOS JÁ EXISTENTES
            const snapIng = await db.ref('ingressos').orderByChild('matricula').equalTo(mat).once('value');
            let totalMat = 0, totalCPF = 0;
            
            snapIng.forEach(s => {
                const ing = s.val();
                if(ing.evento === currentEv.nome) {
                    totalMat++;
                    if(ing.cpf_resgate === cpf) totalCPF++;
                }
            });

            const limite = parseInt(currentEv.limit_ingressos) || 2;

            if(temBriga) {
                const cotaMeia = Math.floor(limite / 2);
                if(totalCPF >= cotaMeia) { alert("⚖️ Limite judicial (50%) já atingido para este CPF."); input.value = ""; return; }
            } else {
                if(totalMat >= limite) { alert("❌ Ingressos já retirados para esta matrícula."); input.value = ""; return; }
            }

            // 3. VALIDA ALUNO
            db.ref('alunos_db/' + mat).once('value', s => {
                if(s.exists() && (s.val().cpf_pai === cpf || s.val().cpf_mae === cpf)) {
                    nomeBox.value = s.val().nome;
                } else {
                    nomeBox.value = "";
                }
            });
        }

        async function processarResgate() {
            const mat = document.getElementById('matInput').value;
            const cpf = document.getElementById('cpfResponsavel').value.replace(/\D/g, "");
            const nome = document.getElementById('nomeMostra').value;
            
            if(!currentEv) return alert("Nenhum evento ativo.");
            if(!nome) return alert("Valide a matrícula primeiro.");
            if(currentEv.estoque <= 0) return alert("Estoque esgotado!");

            const snapExc = await db.ref('excecoes_judiciais/' + mat).once('value');
            const qtd = snapExc.exists() ? 1 : (parseInt(currentEv.limit_ingressos) || 2);

            for(let i=0; i<qtd; i++) {
                const id = `${mat}-${Date.now()}-${i}`;
                await db.ref('ingressos/' + id).set({
                    aluno: nome, matricula: mat, evento: currentEv.nome, cpf_resgate: cpf, utilizado: false, data: new Date().toISOString()
                });

                // GERAR PDF
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(20); doc.text("CONVITE: " + currentEv.nome, 20, 30);
                doc.setFontSize(14); doc.text("ALUNO: " + nome, 20, 45);
                const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: id, width: 128, height: 128 });
                await new Promise(r => setTimeout(r, 500));
                doc.addImage(qrDiv.querySelector('canvas').toDataURL("image/png"), 'PNG', 20, 60, 60, 60);
                doc.save(`Ingresso_${i+1}.pdf`);
            }

            db.ref('eventos/' + currentEvId).update({ estoque: currentEv.estoque - qtd });
            alert("Sucesso! Verifique seus downloads.");
            location.reload();
        }
    </script>
</body>
</html>
