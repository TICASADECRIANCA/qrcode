<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Resgate de Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen text-slate-200 flex flex-col items-center p-6">

    <div id="qrcode-temp" style="display:none"></div>

    <header class="text-center mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter">CASA<span class="text-blue-500">QR</span></h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Portal de Resgate Oficial</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div id="eventoCard" class="glass p-6 rounded-[2.5rem] text-center hidden">
            <h2 id="evNome" class="text-2xl font-black text-white uppercase italic"></h2>
            <p id="evData" class="text-blue-400 font-bold text-sm"></p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] space-y-4">
            <input type="text" id="cpfResponsavel" placeholder="CPF do Responsável" class="w-full p-4 bg-slate-800 rounded-2xl outline-none font-bold text-white border border-slate-700">
            <div class="space-y-2">
                <input type="text" readonly placeholder="Nome do Aluno" id="nomeMostra" class="w-full p-3 bg-transparent text-blue-400 font-bold text-center outline-none">
                <input type="number" id="matInput" oninput="verificarMatricula(this)" placeholder="Matrícula do Aluno" class="w-full p-4 bg-slate-800 rounded-2xl outline-none font-bold text-white border border-slate-700">
            </div>
            <button onclick="processarResgate()" id="btnGerar" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black uppercase shadow-2xl transition-all">Resgatar Meus Ingressos</button>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentEv = null;
        let currentEvId = null;

        // CARREGA EVENTO ATIVO
        db.ref('eventos').on('value', snap => {
            snap.forEach(i => {
                if(i.val().liberado) {
                    currentEv = i.val(); currentEvId = i.key;
                    document.getElementById('eventoCard').classList.remove('hidden');
                    document.getElementById('evNome').innerText = currentEv.nome;
                    document.getElementById('evData').innerText = currentEv.data;
                }
            });
        });

        async function verificarMatricula(input) {
            const mat = input.value;
            const cpf = document.getElementById('cpfResponsavel').value.replace(/\D/g, "");
            if(mat.length < 3 || cpf.length < 11) return;

            // 1. Consulta Exceção Judicial
            const snapExc = await db.ref('excecoes_judiciais/' + mat).once('value');
            const temBriga = snapExc.exists();

            // 2. Consulta Ingressos Existentes
            const snapIng = await db.ref('ingressos').orderByChild('matricula').equalTo(mat).once('value');
            let totalMat = 0, totalCPF = 0;
            snapIng.forEach(s => {
                if(s.val().evento === currentEv.nome) {
                    totalMat++;
                    if(s.val().cpf_resgate === cpf) totalCPF++;
                }
            });

            const limiteGlobal = parseInt(currentEv.limit_ingressos) || 2;

            if(temBriga) {
                const cotaIndiv = Math.floor(limiteGlobal / 2);
                if(totalCPF >= cotaIndiv) { alert("⚖️ Limite judicial atingido para seu CPF."); input.value = ""; return; }
            } else {
                if(totalMat >= limiteGlobal) { alert("❌ Ingressos já retirados."); input.value = ""; return; }
            }

            // 3. Valida no Banco de Alunos
            db.ref('alunos_db/' + mat).once('value', s => {
                if(s.exists() && (s.val().cpf_pai === cpf || s.val().cpf_mae === cpf)) {
                    document.getElementById('nomeMostra').value = s.val().nome;
                } else {
                    alert("Dados não conferem."); input.value = "";
                }
            });
        }

        async function processarResgate() {
            const mat = document.getElementById('matInput').value;
            const cpf = document.getElementById('cpfResponsavel').value.replace(/\D/g, "");
            const nome = document.getElementById('nomeMostra').value;
            if(!mat || !nome) return;

            if(currentEv.estoque <= 0) return alert("Estoque esgotado!");

            // Define quantos serão gerados (1 se for judicial, ou limite total se normal)
            const snapExc = await db.ref('excecoes_judiciais/' + mat).once('value');
            const qtd = snapExc.exists() ? 1 : (parseInt(currentEv.limit_ingressos) || 2);

            for(let i=0; i<qtd; i++) {
                const id = `${mat}-${Date.now()}-${i}`;
                await db.ref('ingressos/' + id).set({
                    aluno: nome, matricula: mat, evento: currentEv.nome, cpf_resgate: cpf, utilizado: false, data: new Date().toISOString()
                });
                
                // Gera PDF (Simples)
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("INGRESSO: " + currentEv.nome, 20, 20);
                doc.text("ALUNO: " + nome, 20, 30);
                const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: id, width: 128, height: 128 });
                setTimeout(() => {
                    doc.addImage(qrDiv.querySelector('canvas').toDataURL("image/png"), 'PNG', 20, 40, 50, 50);
                    doc.save(`Ingresso_${i}.pdf`);
                }, 500);
            }

            db.ref('eventos/' + currentEvId).update({ estoque: currentEv.estoque - qtd });
            alert("Resgate concluído!");
            location.reload();
        }
    </script>
</body>
</html>
