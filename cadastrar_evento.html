<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Gestão Administrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Estilo do Switch de Liberação */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-slate-900 text-white p-4 px-8 flex justify-between items-center shadow-2xl sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" stroke-width="2.5"></path></svg>
            </div>
            <div class="font-extrabold text-xl tracking-tighter uppercase italic">CASA<span class="text-blue-400">QR</span> ADMIN</div>
        </div>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-slate-700 transition">Sincronizar</button>
        </div>
    </nav>

    <div id="qrcode-temp" style="display:none"></div>

    <main class="p-6 md:px-12 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                <h2 class="text-xs font-black text-slate-800 mb-4 uppercase italic">📅 Eventos e Liberação</h2>
                <div id="listaEventosControle" class="space-y-3"></div>
                <hr class="my-4 border-slate-100">
                <div class="space-y-3">
                    <input type="text" id="nome" placeholder="Nome do Evento" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                    <input type="text" id="data" placeholder="Data" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="limit" placeholder="Ingr/Aluno" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        <input type="text" id="imagem" placeholder="URL Imagem" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-xs">
                    </div>
                    <button onclick="salvarEvento()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase hover:bg-blue-700 transition">Criar Novo Evento</button>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white">
                <h2 class="text-xs font-black mb-4 uppercase italic">🎟️ Emissão Manual</h2>
                <div class="space-y-3">
                    <select id="avulsoEvento" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-xs"></select>
                    <input type="number" id="avulsoMat" oninput="vincularDadosAluno(this.value)" placeholder="Matrícula" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                    <input type="text" id="avulsoNome" placeholder="Nome do Aluno" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                    <button onclick="gerarAvulso()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-black shadow-lg hover:bg-emerald-600 transition uppercase text-[10px]">Emitir Ingresso</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-xl font-black text-slate-800 italic uppercase">Fluxo de Ingressos</h2>
                    <input type="text" id="filtroNome" oninput="renderizarTabela()" placeholder="🔍 Pesquisar aluno..." class="w-full md:w-64 p-3 bg-slate-100 rounded-xl outline-none font-bold text-xs">
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <th class="pb-4 px-2">Aluno</th>
                                <th class="pb-4">Evento</th>
                                <th class="pb-4 text-center">Status</th>
                                <th class="pb-4 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaIngressos" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ingressosCache = [];
        let eventosCache = {};

        // 1. GESTÃO DE EVENTOS (Controle de Switch)
        db.ref('eventos').on('value', snap => {
            const cont = document.getElementById('listaEventosControle');
            const sel = document.getElementById('avulsoEvento');
            cont.innerHTML = "";
            sel.innerHTML = '<option>Selecionar Evento...</option>';
            
            snap.forEach(i => {
                const ev = i.val();
                eventosCache[ev.nome] = ev.data;
                
                // Popula Lista de Controle (Switch)
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span class="text-[11px] font-black uppercase text-slate-700 italic">${ev.nome}</span>
                        <div class="flex items-center gap-3">
                            <label class="switch">
                                <input type="checkbox" ${ev.liberado ? 'checked' : ''} onchange="toggleEvento('${i.key}', this.checked)">
                                <span class="slider"></span>
                            </label>
                            <button onclick="deletarEvento('${i.key}')" class="text-red-300 hover:text-red-500 transition">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"></path></svg>
                            </button>
                        </div>
                    </div>`;

                // Popula Select de Emissão Manual
                sel.innerHTML += `<option value="${i.key}">${ev.nome}</option>`;
            });
        });

        function toggleEvento(id, status) { db.ref('eventos/'+id).update({liberado: status}); }
        function deletarEvento(id) { if(confirm('Excluir evento e configurações?')) db.ref('eventos/'+id).remove(); }

        function salvarEvento() {
            const n = document.getElementById('nome').value;
            const d = document.getElementById('data').value;
            if(!n || !d) return alert("Nome e Data obrigatórios!");
            db.ref('eventos').push({
                nome: n, data: d,
                imagem: document.getElementById('imagem').value || 'https://placehold.co/600x400',
                limit_ingressos: document.getElementById('limit').value || 1,
                liberado: true
            }).then(() => { alert("Evento Criado!"); });
        }

        // 2. FLUXO DE INGRESSOS E TABELA
        db.ref('ingressos').on('value', snap => {
            ingressosCache = [];
            snap.forEach(i => ingressosCache.push({key: i.key, ...i.val()}));
            renderizarTabela();
        });

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaIngressos');
            const filtro = document.getElementById('filtroNome').value.toLowerCase();
            tbody.innerHTML = "";
            
            ingressosCache.slice().reverse().forEach(ing => {
                if(ing.aluno.toLowerCase().includes(filtro)) {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                            <td class="py-4 px-2">
                                <div class="font-black text-slate-700 uppercase text-[12px]">${ing.aluno}</div>
                                <div class="text-[9px] text-slate-400 font-bold">Matrícula: ${ing.matricula}</div>
                            </td>
                            <td class="py-4 text-slate-500 text-[10px] font-bold uppercase">${ing.evento}</td>
                            <td class="py-4 text-center">
                                <button onclick="toggleStatus('${ing.key}', ${ing.utilizado})" 
                                    class="px-3 py-1 rounded-full text-[9px] font-black transition ${ing.utilizado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                                    ${ing.utilizado ? 'VALIDADO' : 'PENDENTE'}
                                </button>
                            </td>
                            <td class="py-4 text-right space-x-2">
                                <button onclick="reimprimirIngresso('${ing.key}')" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-blue-600 hover:text-white transition">IMPRIMIR</button>
                                <button onclick="excluirIngresso('${ing.key}')" class="text-red-200 hover:text-red-500 transition">
                                    <svg class="w-4 h-4 inline" fill="currentColor" viewBox="0 0 20 20"><path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"></path></svg>
                                </button>
                            </td>
                        </tr>`;
                }
            });
        }

        function toggleStatus(id, atual) { db.ref('ingressos/'+id).update({utilizado: !atual}); }
        function excluirIngresso(id) { if(confirm('Remover este ingresso do sistema?')) db.ref('ingressos/'+id).remove(); }

        // 3. EMISSÃO MANUAL E BUSCA
        function vincularDadosAluno(mat) {
            if (mat.length < 2) return;
            db.ref('alunos_db/' + mat).once('value', snap => {
                if (snap.exists()) document.getElementById('avulsoNome').value = snap.val().nome;
            });
        }

        function gerarAvulso() {
            const select = document.getElementById('avulsoEvento');
            const evId = select.value;
            const evNome = select.options[select.selectedIndex]?.text;
            const nome = document.getElementById('avulsoNome').value;
            const mat = document.getElementById('avulsoMat').value;

            if(!nome || !mat || evId.includes("Selecionar")) return alert("Dados incompletos!");

            db.ref('eventos/' + evId).once('value', snap => {
                const limite = parseInt(snap.val().limit_ingressos) || 1;
                const batch = {};
                for(let i=0; i<limite; i++) {
                    const id = `${mat}-${Date.now()}-${i}`;
                    batch['ingressos/' + id] = {
                        aluno: nome, matricula: mat, evento: evNome, utilizado: false, data: new Date().toISOString()
                    };
                }
                db.ref().update(batch).then(() => alert("Ingressos Gerados!"));
            });
        }

        // 4. REIMPRESSÃO DE PDF
        async function reimprimirIngresso(id) {
            const ing = ingressosCache.find(x => x.key === id);
            if(!ing) return;
            const dataEv = eventosCache[ing.evento] || "A Confirmar";

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(30, 64, 175); doc.roundedRect(10, 10, 190, 50, 5, 5, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("CONVITE INDIVIDUAL", 105, 30, {align: 'center'});
            doc.setFontSize(14); doc.text(ing.evento.toUpperCase(), 105, 45, {align: 'center'});
            
            doc.setTextColor(30, 41, 59); doc.setFontSize(18); doc.text(ing.aluno, 20, 90);
            doc.setFontSize(12); doc.text("MATRÍCULA: " + ing.matricula, 20, 100);
            doc.text("DATA: " + dataEv, 20, 110);

            const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: id, width: 256, height: 256 });
            
            setTimeout(() => {
                const canvas = qrDiv.querySelector('canvas');
                doc.addImage(canvas.toDataURL("image/png"), 'PNG', 140, 75, 45, 45);
                doc.save(`Reimpressao_${ing.aluno}.pdf`);
            }, 500);
        }
    </script>
</body>
</html>
