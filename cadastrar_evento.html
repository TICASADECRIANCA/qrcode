<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Gestão Administrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-slate-900 text-white p-4 px-8 flex justify-between items-center sticky top-0 z-50 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" stroke-width="2.5"></path></svg>
            </div>
            <div class="font-extrabold text-xl tracking-tighter uppercase italic">CASA<span class="text-blue-400">QR</span> ADMIN</div>
        </div>
        <button onclick="location.reload()" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Sincronizar Banco</button>
    </nav>

    <div id="qrcode-temp" style="display:none"></div>

    <main class="p-6 md:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Total Gerado</p>
                <h3 id="countTotal" class="text-4xl font-black text-slate-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase">Validados (Entraram)</p>
                <h3 id="countValidados" class="text-4xl font-black text-emerald-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-amber-500">
                <p class="text-[10px] font-black text-slate-400 uppercase">Pendentes</p>
                <h3 id="countPendentes" class="text-4xl font-black text-amber-500">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h2 class="text-xs font-black text-slate-800 mb-4 uppercase italic">⚙️ Eventos e Estoque</h2>
                    <div id="listaEventosControle" class="space-y-3 mb-6"></div>
                    <div class="space-y-3 pt-4 border-t border-slate-100">
                        <input type="text" id="nome" placeholder="Nome do Evento" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        <input type="text" id="data" placeholder="Data" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="limit" placeholder="Ingr/Aluno" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                            <input type="number" id="estoqueInicial" placeholder="Estoque" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        </div>
                        <button onclick="salvarEvento()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg">Criar Evento</button>
                    </div>
                </div>

                <div class="bg-red-50 p-6 rounded-[2rem] border border-red-100 shadow-sm">
                    <h2 class="text-xs font-black text-red-800 mb-2 uppercase italic">⚖️ Divisão Judicial (50/50)</h2>
                    <p class="text-[9px] text-red-400 font-bold mb-4 uppercase">Trava resgate: Pai (1) e Mãe (1)</p>
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="matExcecao" placeholder="Matrícula" class="flex-1 p-3 bg-white rounded-xl outline-none font-bold text-sm border border-red-100">
                        <button onclick="registrarExcecao()" class="bg-red-600 text-white px-4 rounded-xl font-black text-xs uppercase">ADD</button>
                    </div>
                    <div id="listaExcecoes" class="space-y-2"></div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white">
                    <h2 class="text-xs font-black mb-4 uppercase italic">🎟️ Emissão Manual</h2>
                    <div class="space-y-3">
                        <select id="avulsoEvento" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-xs"></select>
                        <input type="number" id="avulsoMat" oninput="vincularDadosAluno(this.value)" placeholder="Matrícula" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                        <input type="text" id="avulsoNome" placeholder="Nome do Aluno" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                        <button onclick="gerarAvulso()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-black uppercase text-[10px]">Gerar Ingresso</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-slate-800 italic uppercase leading-none">Fluxo em Tempo Real</h2>
                        <input type="text" id="filtroNome" oninput="renderizarTabela()" placeholder="Buscar aluno..." class="p-3 bg-slate-100 rounded-xl outline-none font-bold text-xs w-48">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                                    <th class="pb-4">Aluno</th>
                                    <th class="pb-4">Evento</th>
                                    <th class="pb-4 text-center">Status</th>
                                    <th class="pb-4 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaIngressos" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ingressosCache = [];
        let eventosInfo = {};

        // --- GESTÃO DE EVENTOS ---
        db.ref('eventos').on('value', snap => {
            const cont = document.getElementById('listaEventosControle');
            const sel = document.getElementById('avulsoEvento');
            cont.innerHTML = ""; sel.innerHTML = '<option>Selecionar Evento...</option>';
            snap.forEach(i => {
                const ev = i.val(); eventosInfo[ev.nome] = ev.data;
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black uppercase text-slate-700">${ev.nome}</span>
                            <span class="text-[9px] font-bold text-blue-600 uppercase">Estoque: ${ev.estoque || 0}</span>
                        </div>
                        <label class="switch"><input type="checkbox" ${ev.liberado ? 'checked' : ''} onchange="db.ref('eventos/${i.key}').update({liberado: this.checked})"><span class="slider"></span></label>
                    </div>`;
                sel.innerHTML += `<option value="${i.key}">${ev.nome}</option>`;
            });
        });

        function salvarEvento() {
            const n = document.getElementById('nome').value, d = document.getElementById('data').value, est = document.getElementById('estoqueInicial').value;
            if(!n || !d || !est) return alert("Preencha tudo!");
            db.ref('eventos').push({ nome: n, data: d, limit_ingressos: document.getElementById('limit').value || 1, estoque: parseInt(est), liberado: true })
            .then(() => alert("Evento criado!"));
        }

        // --- GESTÃO DE EXCEÇÕES ---
        function registrarExcecao() {
            const mat = document.getElementById('matExcecao').value;
            if(!mat) return;
            db.ref('excecoes_judiciais/' + mat).set({ ativa: true }).then(() => document.getElementById('matExcecao').value = "");
        }

        db.ref('excecoes_judiciais').on('value', snap => {
            const lista = document.getElementById('listaExcecoes');
            lista.innerHTML = "";
            snap.forEach(i => {
                lista.innerHTML += `<div class="flex justify-between text-[10px] font-bold bg-white p-2 rounded-lg border border-red-100"><span>MAT: ${i.key}</span><button onclick="db.ref('excecoes_judiciais/${i.key}').remove()" class="text-red-500 underline">Remover</button></div>`;
            });
        });

        // --- TABELA E DASHBOARD ---
        db.ref('ingressos').on('value', snap => {
            ingressosCache = []; let val = 0;
            snap.forEach(i => { const d = i.val(); ingressosCache.push({key: i.key, ...d}); if(d.utilizado) val++; });
            document.getElementById('countTotal').innerText = ingressosCache.length;
            document.getElementById('countValidados').innerText = val;
            document.getElementById('countPendentes').innerText = ingressosCache.length - val;
            renderizarTabela();
        });

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaIngressos'), filtro = document.getElementById('filtroNome').value.toLowerCase();
            tbody.innerHTML = "";
            ingressosCache.slice().reverse().forEach(ing => {
                if(ing.aluno.toLowerCase().includes(filtro)) {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4 px-2"><div class="font-black text-slate-700 uppercase text-[11px]">${ing.aluno}</div><div class="text-[9px] text-slate-400 font-bold">Mat: ${ing.matricula}</div></td>
                            <td class="py-4 text-[10px] font-bold text-slate-500 uppercase italic">${ing.evento}</td>
                            <td class="py-4 text-center"><button onclick="db.ref('ingressos/${ing.key}').update({utilizado: !${ing.utilizado}})" class="px-2 py-1 rounded-full text-[9px] font-black ${ing.utilizado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${ing.utilizado ? 'VALIDADO' : 'PENDENTE'}</button></td>
                            <td class="py-4 text-right space-x-2">
                                <button onclick="reimprimir('${ing.key}')" class="bg-blue-50 text-blue-600 px-2 py-1 rounded font-black text-[9px]">IMPRIMIR</button>
                                <button onclick="if(confirm('Excluir?')) db.ref('ingressos/${ing.key}').remove()" class="text-red-200">Excluir</button>
                            </td>
                        </tr>`;
                }
            });
        }

        async function reimprimir(id) {
            const ing = ingressosCache.find(x => x.key === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(30, 64, 175); doc.roundedRect(10, 10, 190, 50, 5, 5, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("CONVITE INDIVIDUAL", 105, 30, {align: 'center'});
            doc.setFontSize(14); doc.text(ing.evento.toUpperCase(), 105, 45, {align: 'center'});
            doc.setTextColor(30, 41, 59); doc.setFontSize(18); doc.text(ing.aluno, 20, 90);
            doc.setFontSize(12); doc.text("MATRÍCULA: " + ing.matricula, 20, 100);
            const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: id, width: 256, height: 256 });
            setTimeout(() => {
                doc.addImage(qrDiv.querySelector('canvas').toDataURL("image/png"), 'PNG', 140, 75, 45, 45);
                doc.save(`Ingresso_${ing.aluno}.pdf`);
            }, 500);
        }

        function vincularDadosAluno(mat) {
            if (mat.length < 2) return;
            db.ref('alunos_db/' + mat).once('value', snap => {
                if (snap.exists()) document.getElementById('avulsoNome').value = snap.val().nome;
            });
        }

        function gerarAvulso() {
            const evId = document.getElementById('avulsoEvento').value, evNome = document.getElementById('avulsoEvento').options[document.getElementById('avulsoEvento').selectedIndex].text, n = document.getElementById('avulsoNome').value, m = document.getElementById('avulsoMat').value;
            if(!n || !m || evId.includes("Selecionar")) return alert("Dados incompletos!");
            db.ref('eventos/'+evId).once('value', s => {
                const est = s.val().estoque;
                if(est <= 0) return alert("Sem estoque!");
                db.ref('ingressos/' + m + '-' + Date.now()).set({ aluno: n, matricula: m, evento: evNome, utilizado: false, data: new Date().toISOString() })
                .then(() => { db.ref('eventos/'+evId).update({estoque: est - 1}); alert("Gerado!"); });
            });
        }
    </script>
</body>
</html>
