<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Gestão Administrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-slate-900 text-white p-4 px-8 flex justify-between items-center shadow-2xl sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" stroke-width="2.5"></path></svg>
            </div>
            <div class="font-extrabold text-xl tracking-tighter uppercase italic">CASA<span class="text-blue-400">QR</span> ADMIN</div>
        </div>
        <button onclick="location.reload()" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase">Sincronizar</button>
    </nav>

    <div id="qrcode-temp" style="display:none"></div>

    <main class="p-6 md:px-12 max-w-7xl mx-auto">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center md:text-left">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total de Ingressos Gerados</p>
                <h3 id="countTotal" class="text-4xl font-black text-slate-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entradas Validadas</p>
                <h3 id="countValidados" class="text-4xl font-black text-emerald-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-amber-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Aguardando Entrada</p>
                <h3 id="countPendentes" class="text-4xl font-black text-amber-500">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h2 class="text-xs font-black text-slate-800 mb-4 uppercase italic">⚙️ Controle de Eventos / Estoque</h2>
                    <div id="listaEventosControle" class="space-y-3 mb-6 italic"></div>
                    
                    <div class="space-y-3 pt-4 border-t border-slate-100">
                        <input type="text" id="nome" placeholder="Nome do Evento" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        <input type="text" id="data" placeholder="Data" class="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="limit" placeholder="Ingr/Aluno" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                            <input type="number" id="estoqueInicial" placeholder="Qtd Estoque" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-sm">
                        </div>
                        <button onclick="salvarEvento()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg hover:bg-blue-700 transition">Criar Evento com Estoque</button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2rem] shadow-xl text-white">
                    <h2 class="text-xs font-black mb-4 uppercase italic">🎟️ Emissão Manual</h2>
                    <div class="space-y-3">
                        <select id="avulsoEvento" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-xs"></select>
                        <input type="number" id="avulsoMat" oninput="vincularDadosAluno(this.value)" placeholder="Matrícula" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                        <input type="text" id="avulsoNome" placeholder="Nome do Aluno" class="w-full p-3 bg-slate-800 rounded-xl outline-none font-bold text-sm">
                        <button onclick="gerarAvulso()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-black uppercase text-[10px]">Emitir e Abater Estoque</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-slate-800 italic uppercase leading-none">Fluxo de Ingressos</h2>
                        <input type="text" id="filtroNome" oninput="renderizarTabela()" placeholder="Buscar aluno..." class="p-3 bg-slate-100 rounded-xl outline-none font-bold text-xs w-48">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                                    <th class="pb-4">Aluno</th>
                                    <th class="pb-4">Evento</th>
                                    <th class="pb-4 text-center">Status</th>
                                    <th class="pb-4 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaIngressos" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ingressosCache = [];
        let eventosInfo = {};

        // GESTÃO DE EVENTOS E ESTOQUE VISÍVEL
        db.ref('eventos').on('value', snap => {
            const cont = document.getElementById('listaEventosControle');
            const sel = document.getElementById('avulsoEvento');
            cont.innerHTML = ""; sel.innerHTML = '<option>Selecionar Evento...</option>';
            snap.forEach(i => {
                const ev = i.val(); 
                eventosInfo[ev.nome] = ev.data;
                const estoqueClass = ev.estoque <= 10 ? 'text-red-500 animate-pulse' : 'text-blue-600';
                
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black uppercase text-slate-700 leading-tight">${ev.nome}</span>
                            <span class="text-[9px] font-bold ${estoqueClass} uppercase tracking-tighter">Estoque: ${ev.estoque || 0} restando</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <label class="switch"><input type="checkbox" ${ev.liberado ? 'checked' : ''} onchange="toggleEvento('${i.key}', this.checked)"><span class="slider"></span></label>
                            <button onclick="if(confirm('Excluir?')) db.ref('eventos/${i.key}').remove()" class="text-red-200 hover:text-red-500 transition">×</button>
                        </div>
                    </div>`;
                sel.innerHTML += `<option value="${i.key}">${ev.nome}</option>`;
            });
        });

        function toggleEvento(id, status) { db.ref('eventos/'+id).update({liberado: status}); }

        function salvarEvento() {
            const n = document.getElementById('nome').value;
            const d = document.getElementById('data').value;
            const est = document.getElementById('estoqueInicial').value;
            if(!n || !d || !est) return alert("Preencha Nome, Data e Estoque!");
            db.ref('eventos').push({ 
                nome: n, 
                data: d, 
                limit_ingressos: document.getElementById('limit').value || 1, 
                estoque: parseInt(est),
                liberado: true 
            }).then(() => { alert("Evento criado!"); location.reload(); });
        }

        // LÓGICA DA TABELA E DASHBOARD
        db.ref('ingressos').on('value', snap => {
            ingressosCache = [];
            let validados = 0;
            snap.forEach(i => {
                const dado = i.val();
                ingressosCache.push({key: i.key, ...dado});
                if(dado.utilizado) validados++;
            });
            document.getElementById('countTotal').innerText = ingressosCache.length;
            document.getElementById('countValidados').innerText = validados;
            document.getElementById('countPendentes').innerText = ingressosCache.length - validados;
            renderizarTabela();
        });

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaIngressos');
            const filtro = document.getElementById('filtroNome').value.toLowerCase();
            tbody.innerHTML = "";
            ingressosCache.slice().reverse().forEach(ing => {
                if(ing.aluno.toLowerCase().includes(filtro)) {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4 px-2">
                                <div class="font-black text-slate-700 uppercase text-[11px]">${ing.aluno}</div>
                                <div class="text-[9px] text-slate-400 font-bold">Mat: ${ing.matricula}</div>
                            </td>
                            <td class="py-4 text-[10px] font-bold text-slate-500 uppercase italic">${ing.evento}</td>
                            <td class="py-4 text-center">
                                <button onclick="toggleStatus('${ing.key}', ${ing.utilizado})" class="px-2 py-1 rounded-full text-[9px] font-black ${ing.utilizado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${ing.utilizado ? 'VALIDADO' : 'PENDENTE'}</button>
                            </td>
                            <td class="py-4 text-right space-x-2">
                                <button onclick="reimprimir('${ing.key}')" class="bg-blue-50 text-blue-600 px-2 py-1 rounded font-black text-[9px]">IMPRIMIR</button>
                                <button onclick="if(confirm('Excluir?')) db.ref('ingressos/${ing.key}').remove()" class="text-red-200">Excluir</button>
                            </td>
                        </tr>`;
                }
            });
        }

        function toggleStatus(id, atual) { db.ref('ingressos/'+id).update({utilizado: !atual}); }

        // EMISSÃO MANUAL COM ABATIMENTO DE ESTOQUE
        function gerarAvulso() {
            const evId = document.getElementById('avulsoEvento').value;
            const evNome = document.getElementById('avulsoEvento').options[document.getElementById('avulsoEvento').selectedIndex].text;
            const n = document.getElementById('avulsoNome').value;
            const m = document.getElementById('avulsoMat').value;
            if(!n || !m || evId.includes("Selecionar")) return alert("Dados incompletos!");

            db.ref('eventos/' + evId).once('value', snap => {
                const estoqueAtual = snap.val().estoque;
                if(estoqueAtual <= 0) return alert("ESTOQUE ESGOTADO PARA ESTE EVENTO!");

                const id = `${m}-${Date.now()}`;
                db.ref('ingressos/' + id).set({ aluno: n, matricula: m, evento: evNome, utilizado: false, data: new Date().toISOString() })
                .then(() => {
                    db.ref('eventos/' + evId).update({ estoque: estoqueAtual - 1 });
                    alert("Ingresso gerado e estoque atualizado!");
                });
            });
        }

        function vincularDadosAluno(mat) {
            if (mat.length < 2) return;
            db.ref('alunos_db/' + mat).once('value', snap => {
                if (snap.exists()) document.getElementById('avulsoNome').value = snap.val().nome;
            });
        }

        async function reimprimir(id) {
            const ing = ingressosCache.find(x => x.key === id);
            const dataEv = eventosInfo[ing.evento] || "";
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(30, 64, 175); doc.roundedRect(10, 10, 190, 50, 5, 5, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("CONVITE INDIVIDUAL", 105, 30, {align: 'center'});
            doc.setFontSize(14); doc.text(ing.evento.toUpperCase(), 105, 45, {align: 'center'});
            doc.setTextColor(30, 41, 59); doc.setFontSize(18); doc.text(ing.aluno, 20, 90);
            doc.setFontSize(12); doc.text("MATRÍCULA: " + ing.matricula, 20, 100);
            doc.text("DATA: " + dataEv, 20, 110);
            const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: id, width: 256, height: 256 });
            setTimeout(() => {
                doc.addImage(qrDiv.querySelector('canvas').toDataURL("image/png"), 'PNG', 140, 75, 45, 45);
                doc.save(`Reimpressao_${ing.aluno}.pdf`);
            }, 500);
        }
    </script>
</body>
</html>
