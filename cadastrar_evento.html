<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASAQR - Gestão Administrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-5 px-10 flex justify-between items-center sticky top-0 z-50 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg font-black text-2xl tracking-tighter">C</div>
            <div class="font-extrabold text-2xl tracking-tighter uppercase italic">CASA<span class="text-blue-400">QR</span> <span class="text-slate-500 font-medium text-sm ml-2">ADMIN</span></div>
        </div>
        <div class="flex gap-4">
            <label class="bg-emerald-600 hover:bg-emerald-700 px-6 py-2.5 rounded-xl text-xs font-black uppercase cursor-pointer transition-all shadow-lg">
                📥 Importar Alunos
                <input type="file" id="inputPlanilha" class="hidden" onchange="importarPlanilha(this)">
            </label>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl text-xs font-black uppercase transition-all shadow-lg">Sincronizar</button>
        </div>
    </nav>

    <div id="qrcode-temp" style="display:none"></div>

    <main class="p-8 max-w-[1600px] mx-auto space-y-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Ingressos Gerados</p>
                <h3 id="countTotal" class="text-5xl font-black text-slate-800 tracking-tighter">0</h3>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm border-l-[10px] border-l-emerald-500">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Check-ins Realizados</p>
                <h3 id="countValidados" class="text-5xl font-black text-emerald-600 tracking-tighter">0</h3>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm border-l-[10px] border-l-amber-500">
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Aguardando Chegada</p>
                <h3 id="countPendentes" class="text-5xl font-black text-amber-500 tracking-tighter">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200">
                    <h2 class="text-sm font-black text-slate-800 mb-6 uppercase italic flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-600 rounded-full"></span> Gerenciamento de Eventos
                    </h2>
                    <div id="listaEventosControle" class="space-y-4 mb-8"></div>
                    
                    <div class="space-y-4 pt-6 border-t border-slate-100">
                        <input type="text" id="nome" placeholder="Nome do Evento" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500">
                        <input type="text" id="data" placeholder="Data do Evento" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="limit" placeholder="Lote (Ing/Alu)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500">
                            <input type="number" id="estoqueInicial" placeholder="Estoque Total" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-blue-500">
                        </div>
                        <button onclick="salvarEvento()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-blue-600 transition-all">Publicar Evento</button>
                    </div>
                </div>

                <div class="bg-red-50 p-8 rounded-[3rem] border border-red-100 shadow-sm">
                    <h2 class="text-sm font-black text-red-800 mb-2 uppercase italic">⚖️ Divisão Judicial</h2>
                    <p class="text-[10px] text-red-400 font-bold mb-6 uppercase leading-tight">Matrículas nesta lista dividem a cota: 50% Pai / 50% Mãe.</p>
                    <div class="flex gap-3 mb-6">
                        <input type="number" id="matExcecao" placeholder="Matrícula" class="flex-1 p-4 bg-white rounded-2xl outline-none font-bold text-sm border border-red-200 focus:border-red-500">
                        <button onclick="registrarExcecao()" class="bg-red-600 text-white px-6 rounded-2xl font-black text-xs uppercase shadow-md hover:bg-red-700">Adicionar</button>
                    </div>
                    <div id="listaExcecoes" class="space-y-3"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 italic uppercase leading-none">Fluxo de Ingressos</h2>
                            <p class="text-slate-400 text-[10px] font-bold uppercase mt-1">Monitoramento em tempo real</p>
                        </div>
                        <input type="text" id="filtroNome" oninput="renderizarTabela()" placeholder="Buscar aluno ou matrícula..." class="p-4 bg-slate-100 rounded-2xl outline-none font-bold text-xs w-64 border-2 border-transparent focus:border-blue-500 transition-all">
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                                    <th class="pb-5 px-2">Aluno / Matrícula</th>
                                    <th class="pb-5 px-2">Evento</th>
                                    <th class="pb-5 px-2 text-center">Status</th>
                                    <th class="pb-5 px-2 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaIngressos" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBFDlEOhuUerWjSfK_mPVxoj5sGbSDhe9k", 
            authDomain: "ingressoscdc-9ce88.firebaseapp.com", 
            databaseURL: "https://ingressoscdc-9ce88-default-rtdb.firebaseio.com", 
            projectId: "ingressoscdc-9ce88", 
            storageBucket: "ingressoscdc-9ce88.firebasestorage.app", 
            messagingSenderId: "976193676383", 
            appId: "1:976193676383:web:8f141a1bd705f8bc0ae7ea" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let cacheIngressos = [];
        let eventosData = {};

        // IMPORTADOR
        function importarPlanilha(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                json.forEach(a => {
                    if(a.matricula) {
                        db.ref('alunos_db/' + a.matricula).set({
                            nome: a.nome,
                            cpf_pai: String(a.cpf_pai || "").replace(/\D/g, ""),
                            cpf_mae: String(a.cpf_mae || "").replace(/\D/g, ""),
                            turma: a.turma || ""
                        });
                    }
                });
                alert("Base de alunos atualizada com sucesso!");
            };
            reader.readAsArrayBuffer(file);
        }

        // EVENTOS
        db.ref('eventos').on('value', snap => {
            const cont = document.getElementById('listaEventosControle');
            cont.innerHTML = "";
            snap.forEach(i => {
                const ev = i.val();
                eventosData[ev.nome] = ev.data;
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-xs font-black uppercase text-slate-800">${ev.nome}</span>
                            <span class="text-[10px] font-bold text-blue-600 uppercase">Estoque: ${ev.estoque || 0}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <label class="switch"><input type="checkbox" ${ev.liberado ? 'checked' : ''} onchange="db.ref('eventos/${i.key}').update({liberado: this.checked})"><span class="slider"></span></label>
                            <button onclick="if(confirm('Apagar evento?')) db.ref('eventos/${i.key}').remove()" class="text-red-200 hover:text-red-500 transition-all text-xl">×</button>
                        </div>
                    </div>`;
            });
        });

        function salvarEvento() {
            const n = document.getElementById('nome').value, d = document.getElementById('data').value, e = document.getElementById('estoqueInicial').value, l = document.getElementById('limit').value;
            if(!n || !d || !e) return alert("Preencha Nome, Data e Estoque!");
            db.ref('eventos').push({ nome: n, data: d, limit_ingressos: l || 2, estoque: parseInt(e), liberado: true })
            .then(() => { alert("Evento Publicado!"); location.reload(); });
        }

        // EXCEÇÕES
        function registrarExcecao() {
            const m = document.getElementById('matExcecao').value;
            if(!m) return;
            db.ref('excecoes_judiciais/' + m).set({ ativa: true }).then(() => document.getElementById('matExcecao').value = "");
        }

        db.ref('excecoes_judiciais').on('value', snap => {
            const lista = document.getElementById('listaExcecoes');
            lista.innerHTML = "";
            snap.forEach(i => {
                lista.innerHTML += `<div class="flex justify-between text-[11px] font-black bg-white p-3 rounded-xl border border-red-100 shadow-sm text-red-800 uppercase"><span>Mat: ${i.key}</span><button onclick="db.ref('excecoes_judiciais/${i.key}').remove()" class="underline opacity-50 hover:opacity-100">Remover</button></div>`;
            });
        });

        // DASHBOARD E TABELA
        db.ref('ingressos').on('value', snap => {
            cacheIngressos = []; let v = 0;
            snap.forEach(i => { const d = i.val(); cacheIngressos.push({id: i.key, ...d}); if(d.utilizado) v++; });
            document.getElementById('countTotal').innerText = cacheIngressos.length;
            document.getElementById('countValidados').innerText = v;
            document.getElementById('countPendentes').innerText = cacheIngressos.length - v;
            renderizarTabela();
        });

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaIngressos'), filtro = document.getElementById('filtroNome').value.toLowerCase();
            tbody.innerHTML = "";
            cacheIngressos.slice().reverse().forEach(ing => {
                if(ing.aluno.toLowerCase().includes(filtro) || ing.matricula.includes(filtro)) {
                    tbody.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all">
                            <td class="py-5 px-2">
                                <div class="font-black text-slate-700 uppercase text-xs">${ing.aluno}</div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Matrícula: ${ing.matricula}</div>
                            </td>
                            <td class="py-5 px-2 text-[10px] font-bold text-slate-500 uppercase italic">${ing.evento}</td>
                            <td class="py-5 px-2 text-center">
                                <button onclick="db.ref('ingressos/${ing.id}').update({utilizado: !${ing.utilizado}})" class="px-4 py-1.5 rounded-full text-[9px] font-black shadow-sm ${ing.utilizado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${ing.utilizado ? 'VALIDADO' : 'PENDENTE'}</button>
                            </td>
                            <td class="py-5 px-2 text-right space-x-3">
                                <button onclick="reimprimir('${ing.id}')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg font-black text-[9px] uppercase hover:bg-blue-600 hover:text-white transition-all">Imprimir</button>
                                <button onclick="if(confirm('Excluir este ingresso permanentemente?')) db.ref('ingressos/${ing.id}').remove()" class="text-red-200 hover:text-red-500 transition-all">Excluir</button>
                            </td>
                        </tr>`;
                }
            });
        }

        async function reimprimir(id) {
            const ing = cacheIngressos.find(x => x.id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(30, 64, 175); doc.rect(0, 0, 210, 50, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(26); doc.text("CASAQR - REEMISSÃO", 105, 30, {align: 'center'});
            doc.setTextColor(40, 40, 40); doc.setFontSize(18); doc.text(ing.aluno, 20, 80);
            doc.setFontSize(12); doc.text("EVENTO: " + ing.evento, 20, 95);
            doc.text("MATRÍCULA: " + ing.matricula, 20, 105);
            const qrDiv = document.getElementById('qrcode-temp'); qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: id, width: 256, height: 256 });
            await new Promise(r => setTimeout(r, 600));
            doc.addImage(qrDiv.querySelector('canvas').toDataURL("image/png"), 'PNG', 140, 70, 50, 50);
            doc.save(`Reimpressao_${ing.aluno}.pdf`);
        }
    </script>
</body>
</html>
